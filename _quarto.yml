project:
  type: website
  output-dir: docs
  resources:
    - styles/**
    - CNAME
    - .nojekyll
    - ads.txt
website:
  title: "Epsilon Labs"
  description: "Statistical consulting, predictive modeling, and decision-grade analytics."
  favicon: images/preview.png
  twitter-card: true
  site-url: https://epsilon-labs.org
  search:
    location: navbar
    type: overlay
  open-graph: true
  navbar:
    logo: images/home/datascienceyapper-logo-v2.png
    right:
      - text: "About"
        href: content/about/index.qmd
      - text: "Services"
        href: content/services/index.qmd
      - text: "Works"
        menu:
          - text: "Projects"
            href: content/projects/index.qmd
          - text: "Talks"
            href: content/talks/index.qmd
          - text: "Blog"
            href: content/blog/index.qmd
      - text: "Resources"
        href: content/resources/index.qmd
  page-footer:
    left:
      - href: https://www.quarto.org
        text: Made with Quarto®
      - href: https://chatgpt.com/
        text: Built with ChatGPT®
      - href: https://www.cloudflare.com/
        text: Hosted with Cloudflare®
    right:
      - href: content/archive/index.qmd
        text: Archive
      - href: content/privacy/index.qmd
        text: Privacy Policy
      - href: content/license/index.qmd
        text: License
      - icon: linkedin
        href: https://www.linkedin.com/in/bcervantesalvarez/
      - icon: github
        href: https://github.com/bcervantesalvarez/
      - icon: envelope-fill
        href: mailto:briancervantesalvarez@gmail.com
format:
  html:
    citations-hover: true
    footnotes-hover: true
    theme:
      - styles/main.scss
      - styles/editorial.scss
    highlight-style: github-dark
    include-in-header:
            - text: |
                <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4365518179705452" crossorigin="anonymous"></script>
    include-after-body:
      - partials/cookie-consent.html
    filters: [filters/ai-summary.lua]
editor: source
execute:
  freeze: auto
  cache: true